name: Deploy

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
jobs:

  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/iris-api:${{ github.sha }} \
          .

      - name: Push Image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/iris-api:${{ github.sha }}