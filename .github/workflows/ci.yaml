name: CI Pipeline

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start MLflow
        run: |
          nohup mlflow server \
          --backend-store-uri sqlite:///mlflow.db \
          --default-artifact-root ./mlruns \
          --host 127.0.0.1 \
          --port 5000 > mlflow.log 2>&1 & 

      - name: Wait for MLflow
        run: |
          for i in {1..30}; do
            curl -f http://127.0.0.1:5000 && exit 0
            sleep 2
          done
          exit 1
      
      - name: Verify MLflow
        run: |
          curl http://127.0.0.1:5000

      - name: Train and Register Model
        run: |
          python -m src.train
        
      - name: Run Unit Tests
        run: |
          pytest tests/units -v

      - name: Run Integration Tests
        run: |
          pytest tests/integration -v
      
      - name: Build Docker Image
        run: |
          docker build -t iris-api:latest .

      - name: Run Container
        run: |
          docker run -d \
          --name iris-api \
          -p 8000:8000 \
          -e MLFLOW_TRACKING_URI=http://host.docker.internal:5000 \
          iris-api:latest

      - name: Verify API
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi

            echo "Waiting for API..."
            sleep 2
          done

          echo "API never became healthy"
          exit 1