name: CI Pipeline

on:
  push:
    branches: [master]

  pull_request:
    branches: [Master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest
      
      - name: Build Docker Image
        run: |
          docker build -t iris-trainer:v1 .

      - name: Run Container
        run: |
          docker run -d \
            -p 8000:8000 \
            --name iris-api \
            iris-api:v1

      - name: Verify API
        run: |
          curl http://localhost:8000/health